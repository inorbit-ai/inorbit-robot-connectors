# Simple MiR Fleet Configuration
# Copy to config/my_fleet.yaml and update with your details

common:
  connector_type: MiR100
  connector_version: "0.2.2"
  location_tz: America/Los_Angeles
  
  mir_api_version: v2.0
  mir_firmware_version: v3
  mir_use_ssl: false
  
  enable_temporary_mission_group: true

  # Optional: expose Prometheus metrics on the host. Off by default.
  # When enabled, the connector serves /metrics on bind_host:bind_port.
  # If running multiple connectors on one host, give each a unique bind_port.
  # metrics:
  #   enabled: true
  #   bind_host: 0.0.0.0
  #   bind_port: 9090
  #   discovery_dir: null   # set a writable dir to use Prometheus file_sd

  env_vars:
    INORBIT_API_KEY: "${INORBIT_API_KEY}"

my-robot:
  inorbit_robot_key: your-robot-key-here
  mir_host_address: 192.168.1.100
  mir_host_port: 80
  mir_username: "${MIR_USERNAME}"
  mir_password: "${MIR_PASSWORD}"
