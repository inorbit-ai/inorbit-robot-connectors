# Example Docker Compose for MiR Connector
#
# This setup uses your existing fleet configuration (my_fleet.yaml) and makes it 
# easy to deploy one or more robots. Each robot runs in its own container for 
# better isolation and monitoring.
#
# QUICK START:
# 1. cp docker-compose.example.yaml docker-compose.yaml
# 2. Edit docker-compose.yaml with your actual robot IDs
# 3. cp config/example.env config/.env (fill in your credentials)
# 4. docker compose up -d  # Starts ALL robots
# 5. docker compose logs -f  # View logs from ALL robots
#
# CREDENTIALS:
# Secrets are passed as environment variables (the config loader no longer
# expands ${VARS} in the YAML):
#   INORBIT_API_KEY            -> InOrbit account key
#   INORBIT_MIR_MIR_USERNAME   -> connector_config.mir_username
#   INORBIT_MIR_MIR_PASSWORD   -> connector_config.mir_password
# The shared env_file below applies the same values to every robot. Because
# these are read from each container's own environment, you can give a robot
# its own MiR credentials or InOrbit Connect key by overriding them in that
# service's `environment:` block (e.g. INORBIT_MIR_MIR_PASSWORD,
# INORBIT_INORBIT_ROBOT_KEY) — no separate config file needed.
#
# NETWORKING / METRICS:
# Containers use the default bridge network (NOT host networking), so each has
# its own network namespace. The connector reaches MiR robots and InOrbit over
# outbound bridge NAT. When the Prometheus endpoint is enabled
# (metrics.enabled: true in the fleet YAML), do NOT publish host ports: every
# connector writes a Prometheus file_sd discovery file to the shared
# `metrics.discovery_dir` volume, and a collector on this docker network reads
# it and scrapes each connector directly. Set `metrics.advertise_host` to the
# service name (e.g. robot-1) so the target resolves on the network; bind_port
# can be the same for all containers.
#
# ADDING ROBOTS:
# 1. Add a new entry under `fleet:` in config/my_fleet.yaml
# 2. Add corresponding service section below
# 3. docker compose up -d

version: '3.8'

# ==============================================================================
# SHARED TEMPLATE - Reduces duplication and ensures consistency
# ==============================================================================
x-mir-connector: &mir-connector
  # Build from local source
  build:
    context: ../
    dockerfile: docker/Dockerfile
  
  # Load environment variables from your config/.env
  env_file:
    - ../config/.env
  
  # Base environment - robot-specific ROBOT_ID added per service
  environment:
    - CONFIG_FILE=/config/fleet.yaml
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
  
  # Volume mounts - reuse your existing structure
  volumes:
    # Your fleet config - single source of truth
    - ../config/my_fleet.yaml:/config/fleet.yaml:ro
    
    # Persistent data storage (databases, logs, etc.)
    - ./data:/app/data
    
    # User scripts (shared across all robots)
    - ../config/user_scripts:/app/user_scripts:ro
    
    # SSL certificates for MiR robot verification
    - ../certs:/app/certs:ro

    # Shared metrics discovery dir. Point metrics.discovery_dir in the fleet
    # YAML at this path; mount the same `metrics_discovery` volume in your
    # Prometheus/OTel collector so it reads every connector's file_sd target.
    # - metrics_discovery:/var/run/inorbit-metrics

  # Default bridge networking (no host networking). Outbound traffic to MiR
  # robots and InOrbit works via bridge NAT. The Prometheus endpoint is not
  # published to the host — a collector on this docker network scrapes each
  # connector via the file_sd discovery files in the shared metrics.discovery_dir
  # volume (see NETWORKING / METRICS above).
  #
  # Auto-restart policy - works with built-in health monitoring
  restart: unless-stopped
  
  # Logging configuration
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "5"
  
  # Resource limits (adjust based on your server)
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '1.0'
      reservations:
        memory: 256M
        cpus: '0.5'

# ==============================================================================
# SERVICES - One per robot (customize with your actual robot IDs)
# ==============================================================================
services:
  # Example Robot 1 - Replace 'robot-1' with your actual robot ID
  robot-1:
    <<: *mir-connector
    container_name: mir_connector_robot_1
    environment:
      - ROBOT_ID=robot-1
      - CONFIG_FILE=/config/fleet.yaml
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Per-robot MiR credentials: uncomment to override the shared env_file
      # values when this robot has its own login (different password per robot).
      # - INORBIT_MIR_MIR_USERNAME=user_a
      # - INORBIT_MIR_MIR_PASSWORD=pass_a
      # Per-robot InOrbit Connect key (instead of the shared INORBIT_API_KEY):
      # - INORBIT_INORBIT_ROBOT_KEY=robot_a_key

  # Example Robot 2 - Replace 'robot-2' with your actual robot ID
  robot-2:
    <<: *mir-connector
    container_name: mir_connector_robot_2
    environment:
      - ROBOT_ID=robot-2
      - CONFIG_FILE=/config/fleet.yaml
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # - INORBIT_MIR_MIR_USERNAME=user_b
      # - INORBIT_MIR_MIR_PASSWORD=pass_b
      # - INORBIT_INORBIT_ROBOT_KEY=robot_b_key

  # ==============================================================================
  # TEMPLATE FOR ADDING MORE ROBOTS
  # ==============================================================================
  # 
  # To add additional robots:
  # 1. Add a new entry under `fleet:` in config/my_fleet.yaml
  # 2. Copy and customize the template below
  # 3. Run: docker compose up -d
  #
  # your-robot-id:
  #   <<: *mir-connector
  #   container_name: mir_connector_your_robot_id
  #   environment:
  #     - ROBOT_ID=your-robot-id
  #     - CONFIG_FILE=/config/fleet.yaml
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #     # Per-robot MiR credentials (override the shared env_file):
  #     # - INORBIT_MIR_MIR_USERNAME=user_x
  #     # - INORBIT_MIR_MIR_PASSWORD=pass_x
  #   # Note: Each robot uses its own database file:
  #   # /app/data/missions_your-robot-id.db (specified in fleet config)

# ==============================================================================
# VOLUMES - For persistent data
# ==============================================================================
volumes:
  connector_data:
    driver: local
  # Shared metrics discovery dir for file_sd-based scraping. Uncomment the
  # matching mount in the connector template and in your collector service.
  # metrics_discovery:
  #   driver: local
