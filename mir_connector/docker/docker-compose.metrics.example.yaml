#
# Metrics overlay: adds an OTel collector that scrapes the MiR connectors via
# their file_sd discovery files and (by default) logs the metrics for local
# verification. Use it on top of the base compose:
#
#   docker compose -f docker-compose.example.yaml -f docker-compose.metrics.example.yaml up
#
# Prerequisites in each connector (so there is something to scrape):
#   1. In the fleet YAML, enable metrics and point them at the shared volume:
#        metrics:
#          enabled: true
#          bind_host: 0.0.0.0
#          discovery_dir: /var/run/inorbit-metrics
#          advertise_host: <service name>   # e.g. robot-1 — resolvable on the network
#   2. Uncomment the `metrics_discovery:/var/run/inorbit-metrics` volume mount
#      in docker-compose.example.yaml so each connector writes its target file
#      to the shared volume this collector reads.
#
# The collector joins the compose project's default network, so it resolves
# each connector by the advertise_host (service name) in its file_sd target.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.1
    container_name: mir_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.example.yaml:/etc/otelcol/config.yaml:ro
      - metrics_discovery:/var/run/inorbit-metrics:ro

volumes:
  metrics_discovery:
